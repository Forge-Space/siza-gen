name: CI

on:
  push:
    branches: [main, dev, "release/*", "feat/*"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run lint:check
      - run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run build

  api-check:
    name: API Surface Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - name: Build TypeScript declarations
        run: npm run build
      - name: Verify API reports are up to date
        run: npm run api:check
      - name: Upload diff on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: api-extractor-diff
          path: |
            etc/*.api.md
            temp/*.api.md

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run build
      - run: npm test

  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npx knip --no-exit-code --reporter compact 2>&1 | head -60

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm audit --audit-level=high || true
