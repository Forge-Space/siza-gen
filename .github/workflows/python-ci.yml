name: Python CI

on:
  push:
    branches: [main]
    paths: ["python/**"]
  pull_request:
    branches: [main]
    paths: ["python/**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check

      - name: Format check
        run: ruff format --check

      - name: Test
        run: python -m pytest tests/ -v
