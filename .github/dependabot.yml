version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      forge-ecosystem:
        patterns: ["@forgespace/*"]
      minor-and-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
